<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – ExamSphere</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020617;--card:#0f172a;--border:#1e293b;--purple:#7c3aed;--blue:#3b82f6;--pink:#ec4899;--cyan:#06b6d4;--green:#22c55e;--text:#f8fafc;--muted:#64748b;--error:#ef4444}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 30% 50%,rgba(124,58,237,0.12),transparent 60%),radial-gradient(ellipse 50% 40% at 70% 50%,rgba(59,130,246,0.08),transparent 60%)}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse at center,black 0%,transparent 70%)}
.card{position:relative;z-index:1;background:rgba(15,23,42,0.8);border:1px solid rgba(51,65,85,0.5);border-radius:24px;padding:2.5rem;width:100%;max-width:420px;backdrop-filter:blur(20px);box-shadow:0 25px 60px rgba(0,0,0,0.5)}
.logo{font-family:'Clash Display',sans-serif;font-size:1.4rem;background:linear-gradient(135deg,var(--purple),var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2rem;text-align:center}
.role-toggle{display:grid;grid-template-columns:1fr 1fr;background:var(--bg);border-radius:12px;padding:4px;gap:4px;margin-bottom:2rem;border:1px solid var(--border)}
.role-btn{padding:.65rem;border:none;border-radius:9px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;transition:all .3s;background:transparent;color:var(--muted)}
.role-btn.active{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;box-shadow:0 4px 12px rgba(124,58,237,0.3)}
h2{font-family:'Clash Display',sans-serif;font-size:1.5rem;margin-bottom:.3rem}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:1.8rem}
label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;background:rgba(30,41,59,0.6);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--text);outline:none;transition:all .3s;margin-bottom:1.2rem}
input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.btn{width:100%;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;border:none;padding:.9rem;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;transition:all .3s;margin-top:.5rem;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(124,58,237,0.4)}
.btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:.75rem 1rem;font-size:.85rem;color:var(--error);margin-bottom:1rem;display:none}
.hint{background:rgba(30,41,59,0.5);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;margin-top:1.2rem}
.hint p{font-size:.78rem;color:var(--muted);line-height:1.6}
.hint strong{color:var(--text);font-weight:500}
.back{text-align:center;margin-top:1.5rem}
.back a{color:var(--muted);font-size:.85rem;text-decoration:none;transition:.3s}
.back a:hover{color:var(--purple)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>
<div class="card">
  <div class="logo">⬡ ExamSphere</div>
  <div class="role-toggle">
    <button class="role-btn active" onclick="setRole('student',this)">🎓 Student</button>
    <button class="role-btn" onclick="setRole('admin',this)">⚙ Admin</button>
  </div>
  <h2 id="title">Student Login</h2>
  <p class="sub" id="sub">Enter your credentials to access your dashboard.</p>
  <div class="error" id="error"></div>
  <label>Email Address</label>
  <input type="email" id="email" placeholder="you@exam.com" />
  <label>Password</label>
  <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
  <button class="btn" id="loginBtn" onclick="login()">Sign In →</button>
  <div class="hint">
    <p><strong>Admin:</strong> admin@exam.com / admin123</p>
    <p><strong>Students:</strong> e.g. dhan@exam.com / 1234</p>
  </div>
  <div class="back"><a href="/">← Back to Home</a></div>
</div>

<script>
let role = 'student';
function setRole(r, el) {
  role = r;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('title').textContent = r === 'admin' ? 'Admin Login' : 'Student Login';
  document.getElementById('sub').textContent = r === 'admin'
    ? 'Access the administration panel.'
    : 'Enter your credentials to access your dashboard.';
}
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('error');
  const btn = document.getElementById('loginBtn');
  if (!email || !password) { showError('Please fill in all fields.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';
  err.style.display = 'none';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password, role})
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.redirect;
    } else {
      showError(data.message || 'Invalid credentials');
      btn.disabled = false;
      btn.innerHTML = 'Sign In →';
    }
  } catch(e) {
    showError('Connection error. Please try again.');
    btn.disabled = false;
    btn.innerHTML = 'Sign In →';
  }
}
function showError(msg) {
  const err = document.getElementById('error');
  err.textContent = msg;
  err.style.display = 'block';
}
</script>
</body>
</html>
